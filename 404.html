<!DOCTYPE html>
<html lang="en">

<head>
  <title>Page Not Found — Spectrum Creations</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Spectrum Creations to keep browsing handmade art by neurodiverse artists.">

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" type="text/css" href="style.css">

  <style>
    /* Scoped styles for the 404 page only — reuses the site's design tokens from style.css */
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg);
      text-align: center;
    }

    .error-card {
      max-width: 560px;
      width: 100%;
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(80px, 18vw, 150px);
      font-weight: 700;
      line-height: 1;
      color: var(--primary);
      margin: 0;
      position: relative;
      display: inline-block;
    }

    .error-code em {
      font-style: italic;
      color: var(--accent);
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-alt);
      color: var(--primary-dark);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(22px, 4vw, 30px);
      color: var(--dark);
      margin: 12px 0 10px;
    }

    .error-text {
      font-family: var(--font-body);
      color: var(--text-light);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 auto 30px;
      max-width: 420px;
    }

    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      padding: 13px 26px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: var(--transition);
      border: 1px solid transparent;
      cursor: pointer;
    }

    .error-btn-primary {
      background: var(--primary);
      color: var(--white);
      box-shadow: var(--shadow-card);
    }

    .error-btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
    }

    .error-btn-outline {
      background: transparent;
      color: var(--dark);
      border-color: var(--border);
    }

    .error-btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
      transform: translateY(-2px);
    }

    .error-links {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-light);
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-links a {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 500;
    }

    .error-links a:hover {
      text-decoration: underline;
    }

    .error-links .dot {
      color: var(--border);
    }

    .error-logo {
      height: 34px;
      margin-bottom: 34px;
    }
  </style>
</head>

<body>

  <div class="error-page">
    <div class="error-card">
      <a href="index.html" aria-label="Spectrum Creations — Home">
        <img src="images/main-logo.png" alt="" class="error-logo" decoding="async">
      </a>

      <span class="error-badge"><i class="bi bi-compass"></i> Error 404</span>
      <h1 class="error-code">4<em>0</em>4</h1>
      <h2 class="error-title">We couldn't find that page</h2>
      <p class="error-text">
        The page you're looking for may have been moved, renamed, or doesn't exist.
        Let's get you back to browsing handmade art from our neurodiverse artists.
      </p>

      <div class="error-actions">
        <a href="index.html" class="error-btn error-btn-primary">
          <i class="bi bi-house-door"></i> Back to Home
        </a>
        <a href="index.html#allCollections" class="error-btn error-btn-outline">
          <i class="bi bi-bag"></i> Browse Collections
        </a>
      </div>

      <div class="error-links">
        <a href="index.html#special-offer">Offers</a>
        <span class="dot">&bull;</span>
        <a href="index.html#reviews">Reviews</a>
        <span class="dot">&bull;</span>
        <a href="index.html#about">About</a>
        <span class="dot">&bull;</span>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </div>

</body>

</html>
