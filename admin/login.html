<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sign in · Spectrum Creations Admin</title>
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="mark">SC</div>
      <h1>Spectrum Creations</h1>
      <p>Sign in to the admin panel</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px;" id="loginBtn">
          Sign in
        </button>
      </form>

      <div class="login-hint">
        First time here? Default login is
        <strong>admin@spectrumcreations.test</strong> / <strong>Admin@12345</strong>
        — set in <code>backend/schema_admin.sql</code>. Change the password
        immediately from Users &amp; Roles after your first sign-in.
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const res = await fetch('../backend/api/auth.php?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const json = await res.json();
        if (!res.ok || json.error) {
          throw new Error(json.message || 'Sign in failed');
        }
        window.location.href = 'index.html';
      } catch (err) {
        errBox.textContent = err.message || 'Could not reach the server. Is the backend running?';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
